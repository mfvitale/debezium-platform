panels:
  - id: event-count
    title: "Event Count"
    description: "Rate of change data capture events processed per second (create, update, delete)"
    category: streaming
    query: 'rate(debezium_event_count_total{service_name="{{pipeline_id}}",debezium_event_type="create"}[5m])'
    unit: events/s
    visualization:
      type: line
      suggestedStep: 15s
