panels:

  # --- Streaming ---

  - id: streaming-event-count
    title: "Streaming Event Count"
    description: "Rate of streaming change data capture events per second, grouped by event type (create, update, delete)"
    category: streaming
    query: 'rate(debezium_event_count_total{service_name="{{pipeline_id}}",debezium_context="streaming"}[5m])'
    unit: events/s
    visualization:
      type: area
      suggestedStep: 15s

  - id: source-lag
    title: "Source Lag"
    description: "Time between a change occurring in the source database and Debezium processing it"
    category: streaming
    query: 'debezium_source_lag{service_name="{{pipeline_id}}"}'
    unit: s
    visualization:
      type: line
      suggestedStep: 15s

  - id: time-since-last-event
    title: "Time Since Last Event"
    description: "Elapsed time since the last change event was processed"
    category: streaming
    query: 'debezium_event_time_since_last{service_name="{{pipeline_id}}"}'
    unit: s
    visualization:
      type: line
      suggestedStep: 15s

  - id: erroneous-events
    title: "Erroneous Events"
    description: "Rate of events that resulted in an error during processing"
    category: streaming
    query: 'rate(debezium_event_erroneous_count_total{service_name="{{pipeline_id}}"}[5m])'
    unit: events/s
    visualization:
      type: line
      suggestedStep: 15s

  - id: events-filtered
    title: "Events Filtered"
    description: "Rate of events excluded by the connector filter configuration"
    category: streaming
    query: 'rate(debezium_event_filtered_count_total{service_name="{{pipeline_id}}"}[5m])'
    unit: events/s
    visualization:
      type: area
      suggestedStep: 15s

  - id: committed-transactions
    title: "Committed Transactions"
    description: "Rate of committed transactions processed from the source database"
    category: streaming
    query: 'rate(debezium_transaction_committed_count_total{service_name="{{pipeline_id}}"}[5m])'
    unit: transactions/s
    visualization:
      type: area
      suggestedStep: 15s

  - id: connection-status
    title: "Connection Status"
    description: "Database connection status (1 = connected, 0 = disconnected)"
    category: streaming
    query: 'debezium_connection_status{service_name="{{pipeline_id}}",debezium_connection_state="connected"}'
    unit: ""
    visualization:
      type: donut-utilization
      suggestedStep: 15s

  # --- Queue ---

  - id: queue-utilization
    title: "Queue Utilization"
    description: "Percentage of the internal event queue currently in use"
    category: streaming
    query: '(debezium_queue_limit{service_name="{{pipeline_id}}"} - debezium_queue_remaining_capacity{service_name="{{pipeline_id}}"}) / debezium_queue_limit{service_name="{{pipeline_id}}"} * 100'
    unit: "%"
    visualization:
      type: donut-utilization
      suggestedStep: 15s

  - id: queue-size-utilization
    title: "Queue Size Utilization"
    description: "Percentage of the internal event queue byte capacity currently in use"
    category: streaming
    query: 'debezium_queue_size{service_name="{{pipeline_id}}"} / debezium_queue_size_limit{service_name="{{pipeline_id}}"} * 100'
    unit: "%"
    visualization:
      type: donut-utilization
      suggestedStep: 15s

  # --- Snapshot ---

  - id: snapshot-event-count
    title: "Snapshot Event Count"
    description: "Rate of snapshot change data capture events per second, grouped by event type (create, update, delete)"
    category: snapshot
    query: 'rate(debezium_event_count_total{service_name="{{pipeline_id}}",debezium_context="snapshot"}[5m])'
    unit: events/s
    visualization:
      type: area
      suggestedStep: 15s

  - id: snapshot-table-progress
    title: "Snapshot Table Progress"
    description: "Number of tables remaining to be captured during the snapshot"
    category: snapshot
    query: 'debezium_snapshot_table_remaining_count{service_name="{{pipeline_id}}"}'
    unit: tables
    visualization:
      type: donut-utilization
      suggestedStep: 15s

  - id: snapshot-duration
    title: "Snapshot Duration"
    description: "Total elapsed time of the current or most recent snapshot"
    category: snapshot
    query: 'debezium_snapshot_duration{service_name="{{pipeline_id}}"}'
    unit: s
    visualization:
      type: line
      suggestedStep: 15s

  - id: snapshot-running
    title: "Snapshot Running"
    description: "Whether a snapshot is currently running (1 = running, 0 = not running)"
    category: snapshot
    query: 'debezium_snapshot_running{service_name="{{pipeline_id}}",debezium_snapshot_running_state="running"}'
    unit: ""
    visualization:
      type: donut-utilization
      suggestedStep: 15s

  - id: snapshot-completed
    title: "Snapshot Completed"
    description: "Whether the snapshot has completed (1 = completed, 0 = not completed)"
    category: snapshot
    query: 'debezium_snapshot_completed{service_name="{{pipeline_id}}",debezium_snapshot_completed_state="completed"}'
    unit: ""
    visualization:
      type: donut-utilization
      suggestedStep: 15s

  - id: snapshot-aborted
    title: "Snapshot Aborted"
    description: "Whether the snapshot was aborted (1 = aborted, 0 = not aborted)"
    category: snapshot
    query: 'debezium_snapshot_aborted{service_name="{{pipeline_id}}",debezium_snapshot_aborted_state="aborted"}'
    unit: ""
    visualization:
      type: donut-utilization
      suggestedStep: 15s
