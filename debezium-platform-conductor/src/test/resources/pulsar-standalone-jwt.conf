# Basic broker settings
brokerServicePort=6650
webServicePort=8080
bindAddress=0.0.0.0

# Storage settings (in-memory for testing)
managedLedgerDefaultEnsembleSize=1
managedLedgerDefaultWriteQuorum=1
managedLedgerDefaultAckQuorum=1

# Disable these for faster startup
functionsWorkerEnabled=false
transactionCoordinatorEnabled=false

# Authentication - simplified
authenticationEnabled=true
authenticationProviders=org.apache.pulsar.broker.authentication.AuthenticationProviderToken
tokenSecretKey=data:;base64,WaVf/RB7ZAW7pMG3rhxnL3zC2QFqyyLaKl5W6JwWdhw=

# Authorization
authorizationEnabled=true
superUserRoles=admin

# Broker client auth for internal communication
# Token value also available as ApachePulsarTestResourceJwtAuth.TEST_JWT_TOKEN
brokerClientAuthenticationPlugin=org.apache.pulsar.client.impl.auth.AuthenticationToken
brokerClientAuthenticationParameters=token:eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJhZG1pbiJ9.VyRprXLybrDgsWKQEN5UnuIudMJRkwB0wpVZxIWfQLs