# Basic broker settings
brokerServicePort=6650
webServicePort=8080
bindAddress=0.0.0.0

# Storage settings (in-memory for testing)
managedLedgerDefaultEnsembleSize=1
managedLedgerDefaultWriteQuorum=1
managedLedgerDefaultAckQuorum=1

# Disable these for faster startup
functionsWorkerEnabled=false
transactionCoordinatorEnabled=false

# Authentication - simplified
authenticationEnabled=true
authenticationOpenid=true


# OpenID/OAuth2 settings
openIDAllowedTokenIssuers=http://mock-oauth2-server.auth.svc.cluster.local:8080/default
openIDAllowedAudiences=default, admin
openIDRoleClaim=sub
openIDRequireIssuersUseHttps=false
openIDFallbackDiscoveryMode=DISABLED