domain:
  url: ""
  name: ""
stage:
  image: quay.io/debezium/platform-stage:nightly
  imagePullPolicy: IfNotPresent
conductor:
  image: quay.io/debezium/platform-conductor:nightly
  imagePullPolicy: IfNotPresent
  offset:
    existingConfigMap: ""
  descriptors:
    official:
      enabled: true
      registry: quay.io
      image: debezium/debezium-descriptors
      tag: nightly
      mountPath: /opt/descriptors
  extraVolumes: [ ]
  extraVolumeMounts: [ ]
server:
  image: ""
ingress:
  enabled: true
  className: ""
  annotations: {}
  tls:
    enabled: false
    secretName: ""
offset:
  reusePlatformDatabase: true
  database:
    name: postgres
    host: postgres
    port: 5432
    username: user
    password: password
    auth:
      existingSecret: ""
schemaHistory:
  reusePlatformDatabase: true
  database:
    name: postgres
    host: postgres
    port: 5432
    username: user
    password: password
    auth:
      existingSecret: ""
database:
  enabled: false
  name: postgres
  host: postgres
  auth:
    existingSecret: ""
debezium-operator:
  enabled: true
pipeline:
  labels: {}
monitoring:
  otel:
    enabled: false
    collector:
      # The Prometheus exporter is included in the base (otelcol) and contrib distributions,
      # but NOT in the k8s distribution (otelcol-k8s) which is the default when the OTel Operator
      # is installed via Helm. Override the image if your operator defaults to k8s distribution.
      # Example: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector:0.152.0
      image: ""
      replicas: 1
      receivers:
        grpc:
          port: 4317
        http:
          port: 4318
      processors:
        batch:
          timeout: 5s
          sendBatchSize: 512
      exporters:
        prometheus:
          port: 8889
          resourceToTelemetryConversion: true
          constLabels:
            platform: debezium
  prometheus:
    external:
      url: ""
    serviceMonitor:
      enabled: true
      scrapeInterval: 15s
      labels:
        prometheus: kube-prometheus
env: []